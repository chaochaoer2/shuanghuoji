<svg xmlns="http://www.w3.org/2000/svg" width="941" height="1672" viewBox="0 0 941 1672">
  <defs>
    <filter id="paperNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="4" seed="42"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.12"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="9" flood-color="#7d6b4c" flood-opacity="0.18"/>
    </filter>
    <style>
      .ink{fill:#0b5a4a;font-family:"Microsoft YaHei","PingFang SC",sans-serif;font-weight:900}
      .orange{fill:#d95a32;font-family:"Microsoft YaHei","PingFang SC",sans-serif;font-weight:900}
      .hand{fill:#163f38;font-family:"KaiTi","STKaiti","Microsoft YaHei",sans-serif;font-weight:900}
      .line{fill:none;stroke:#172d2a;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
      .doodle{fill:none;stroke:#7da06c;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;opacity:.86}
      .blue{fill:none;stroke:#79aee0;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;opacity:.86}
      .accent{fill:none;stroke:#e06934;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .sun{fill:none;stroke:#f0a712;stroke-width:4;stroke-linecap:round}
      .dash{fill:#fffdf6;stroke:#7da06c;stroke-width:4;stroke-dasharray:10 10}
    </style>
  </defs>

  <rect width="941" height="1672" fill="#fbf2df" filter="url(#paperNoise)"/>
  <rect x="18" y="18" width="905" height="1636" rx="22" fill="none" stroke="#efd9a2" stroke-width="7" opacity=".55"/>

  <text x="60" y="84" class="ink" font-size="42">爽活迹</text>
  <text x="210" y="82" class="ink" font-size="26">Schoolwalk</text>
  <g class="sun" transform="translate(365 58)">
    <circle r="13"/>
    <path d="M0-29v-12M0 29v12M-29 0h-12M29 0h12M-21-21l-8-8M21 21l8 8M21-21l8-8M-21 21l-8 8"/>
  </g>

  <path d="M70 150l-26 18 20 8 8 20 28-50z" class="doodle" opacity=".55"/>
  <path d="M820 210c18-30 54-20 46 14-5 22-35 42-52 52-12-18-28-48 6-66z" class="accent"/>
  <path d="M55 268c18-34 44-46 72-30M78 290c22-16 44-16 66 0" class="doodle"/>

  <g transform="rotate(-3 380 126)" filter="url(#softShadow)">
    <rect x="70" y="92" width="570" height="112" rx="8" fill="#e5d0ab"/>
    <text x="112" y="172" class="ink" font-size="72">校园</text>
    <text x="292" y="172" class="orange" font-size="72">路线手账</text>
  </g>
  <rect x="42" y="128" width="66" height="34" rx="4" fill="#ef9d93" opacity=".58" transform="rotate(-18 75 145)"/>
  <rect x="120" y="346" width="116" height="42" rx="4" fill="#99b77e" opacity=".62" transform="rotate(-15 178 367)"/>
  <rect x="704" y="372" width="110" height="42" rx="4" fill="#e98991" opacity=".62" transform="rotate(15 759 393)"/>
