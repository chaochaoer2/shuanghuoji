    <rect x="812" y="42" width="76" height="34" rx="4" fill="#99b77e" opacity=".65" transform="rotate(14 850 59)"/>
    <path d="M748 126c-20 16-20 36 0 52M748 126c22 18 22 36 0 52" class="doodle"/>
    <path d="M728 86l8 16 18 2-13 12 4 18-17-9-16 9 4-18-13-12 18-2z" class="sun"/>
  </g>

