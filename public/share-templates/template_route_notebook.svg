  <rect x="726" y="1168" width="122" height="42" rx="4" fill="#f0a15f" opacity=".62" transform="rotate(16 787 1189)"/>
  <rect x="92" y="1146" width="118" height="42" rx="4" fill="#88a7d0" opacity=".58" transform="rotate(-14 151 1167)"/>

