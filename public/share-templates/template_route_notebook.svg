  <path d="M324 545c-42 12-70 36-86 72M655 970c34 8 60 26 78 54" class="doodle"/>
  <path d="M340 1038c-28 4-48 20-62 46M696 1348c36 8 64 28 84 62" class="accent"/>

  <path d="M70 1510c28-28 60-34 96-14M760 1508c34-30 70-32 108-8" class="doodle"/>
  <path d="M76 1530c-18-32-8-64 24-88M118 1534c-10-42 6-74 48-98M808 1530c-12-38 2-70 42-96M848 1536c4-42 28-70 72-84" class="doodle"/>

  <text x="180" y="1570" class="ink" font-size="34">不卷步数，只记录一次出门回血</text>
  <path d="M180 1588c160-14 410-14 620 0" class="accent"/>
</svg>
