<svg xmlns="http://www.w3.org/2000/svg" width="1086" height="1448" viewBox="0 0 1086 1448">
  <defs>
    <filter id="paperNoise" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" seed="8"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#7d6b4c" flood-opacity="0.16"/>
    </filter>
    <style>
      .ink{fill:#0b5a4a;font-family:"Microsoft YaHei","PingFang SC",sans-serif;font-weight:900}
      .orange{fill:#d95a32;font-family:"Microsoft YaHei","PingFang SC",sans-serif;font-weight:900}
      .line{fill:none;stroke:#0b6b57;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
      .doodle{fill:none;stroke:#7da06c;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;opacity:.82}
      .accent{fill:none;stroke:#e06934;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .dash{fill:none;stroke:#7da06c;stroke-width:4;stroke-dasharray:10 8;stroke-linecap:round}
    </style>
  </defs>

  <rect width="1086" height="1448" fill="#fbf3df" filter="url(#paperNoise)"/>
